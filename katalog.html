<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BILDWERK – Katalog Nr. 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --paper:     #f5eed6;
    --paper-alt: #f0e6c8;
    --terra:     #c4603a;
    --terra-dk:  #8b3a1e;
    --brown:     #4a2c14;
    --brown-lt:  #7a5230;
    --cream:     #faf6ea;
    --ink:       #1e0e04;
    --accent:    #d4a535;
    --frame:     3px solid var(--brown);
    --shadow:    4px 4px 0 var(--brown);
    --gallery-url: "https://www.deviantart.com/rembrandtiusai/tier/rembrandtius-CLIPS-AI-MUSCLE-MOVEMENT-1238677185";
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #2a1a08; font-family: 'Courier Prime', monospace; color: var(--ink); min-height: 100vh; }

  /* ── STARTSEITE ─────────────────────────── */
  #startseite {
    min-height: 100vh; background: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; position: relative; overflow: hidden;
  }
  #startseite::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(74,44,20,.06) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(74,44,20,.04) 29px);
    pointer-events: none;
  }
  .titel-band { background: var(--terra); color: var(--cream); padding: 10px 40px; font-family: 'Special Elite', cursive; font-size: .75rem; letter-spacing: .25em; text-transform: uppercase; margin-bottom: 12px; border: 2px solid var(--brown); box-shadow: var(--shadow); }
  .titel-hauptwort { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,7rem); font-weight: 700; line-height: .9; color: var(--brown); text-align: center; letter-spacing: -.03em; }
  .titel-untertitel { font-family: 'Special Elite', cursive; font-size: .9rem; color: var(--terra-dk); letter-spacing: .15em; text-transform: uppercase; margin: 14px 0 40px; }

  .start-box { background: var(--cream); border: var(--frame); box-shadow: var(--shadow); padding: 28px 36px; max-width: 480px; width: 100%; position: relative; }
  .start-box::before { content: '▶ AUSWAHL'; position: absolute; top: -12px; left: 16px; background: var(--terra); color: var(--cream); font-family: 'Special Elite', cursive; font-size: .7rem; letter-spacing: .2em; padding: 2px 10px; border: 2px solid var(--brown); }

  .option-row { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px dashed var(--brown-lt); cursor: pointer; }
  .option-row:last-of-type { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .option-row input[type="radio"] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--brown); background: var(--paper); cursor: pointer; flex-shrink: 0; margin-top: 3px; position: relative; transition: background .15s; }
  .option-row input[type="radio"]:checked { background: var(--terra); }
  .option-row input[type="radio"]:checked::after { content: '✕'; position: absolute; inset: 0; font-size: .75rem; color: var(--cream); display: flex; align-items: center; justify-content: center; }
  .option-info { flex: 1; }
  .option-titel { font-weight: 700; font-size: .95rem; color: var(--brown); }
  .option-meta  { font-size: .75rem; color: var(--brown-lt); margin-top: 3px; line-height: 1.5; }
  .option-preis { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--terra); white-space: nowrap; align-self: center; }

  .start-btn { display: block; width: 100%; margin-top: 24px; padding: 14px; background: var(--terra); color: var(--cream); border: 2px solid var(--brown); box-shadow: var(--shadow); font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: transform .1s, box-shadow .1s; }
  .start-btn:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--brown); }
  .start-btn:active { transform: translate(4px,4px); box-shadow: none; }
  .impressum { margin-top: 28px; font-size: .65rem; color: var(--brown-lt); text-align: center; letter-spacing: .08em; line-height: 1.8; }

  /* ── KATALOG ────────────────────────────── */
  #katalog { display: none; }

  .katalog-header { background: var(--terra); color: var(--cream); display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 3px solid var(--brown); position: sticky; top: 0; z-index: 100; }
  .katalog-header .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
  .katalog-header nav { display: flex; gap: 16px; font-family: 'Special Elite', cursive; font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; }
  .katalog-header nav a { color: var(--cream); text-decoration: none; opacity: .8; cursor: pointer; }
  .katalog-header nav a:hover { opacity: 1; }
  .seiten-nav { display: flex; gap: 10px; }
  .nav-btn { background: var(--terra-dk); color: var(--cream); border: 1.5px solid var(--cream); font-family: 'Special Elite', cursive; font-size: .7rem; letter-spacing: .1em; padding: 4px 12px; cursor: pointer; transition: background .15s; }
  .nav-btn:hover { background: var(--brown); }
  .nav-btn:disabled { opacity: .35; cursor: default; }

  /* Ladeindikator */
  #lader { text-align: center; padding: 80px 20px; color: var(--cream); font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: .2em; }

  /* ── DOPPELSEITE ────────────────────────── */
  .doppelseite { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 4px solid var(--brown); position: relative; }
  .seite { background: var(--paper); padding: 24px 20px 60px; position: relative; border-right: 2px solid var(--brown-lt); min-height: 100vh; }
  .seite:last-child { background: var(--paper-alt); border-right: none; }
  .buch-ruecken { position: absolute; top: 0; bottom: 0; left: 50%; width: 6px; z-index: 10; background: linear-gradient(90deg, rgba(74,44,20,.3), rgba(74,44,20,.05), rgba(74,44,20,.3)); pointer-events: none; }

  .kapitel-kopf { border-bottom: 2px solid var(--brown); margin-bottom: 16px; padding-bottom: 8px; display: flex; align-items: baseline; gap: 12px; }
  .kapitel-nr { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--terra); line-height: 1; }
  .kapitel-titel { font-family: 'Special Elite', cursive; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; color: var(--brown); }

  /* ── ITEM-GRID: 3 Spalten × 2 Zeilen = 6 pro Seite ────── */
  .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

  /* ── BILD-KARTE ─────────────────────────── */
  .item-karte { border: 2px solid var(--brown); box-shadow: 2px 2px 0 var(--brown); overflow: hidden; background: var(--brown); position: relative; }

  /* Bild: contain (kein Crop!), schwarzer Hintergrund */
  .item-karte .bild-box {
    background: #111;
    display: flex; align-items: center; justify-content: center;
    aspect-ratio: 1/1;
    overflow: hidden;
  }
  .item-karte .bild-box img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain;
    display: block;
  }

  /* Video-Karte: Vorschaubild + Play */
  .item-karte.video-karte { cursor: pointer; }
  .item-karte .video-box {
    background: #111;
    display: flex; align-items: center; justify-content: center;
    aspect-ratio: 1/1;
    overflow: hidden;
    position: relative;
  }
  .item-karte .video-box img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain;
    display: block;
  }
  .item-karte .video-box .play-mini {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(74,44,20,.3);
    transition: background .15s;
  }
  .item-karte.video-karte:hover .play-mini { background: rgba(74,44,20,.5); }
  .play-mini-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--terra); border: 2px solid var(--cream);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 1px 1px 0 var(--brown);
  }
  .play-mini-btn svg { fill: var(--cream); width: 12px; height: 12px; margin-left: 2px; }

  .video-label { background: var(--terra); color: var(--cream); font-family: 'Special Elite', cursive; font-size: .5rem; letter-spacing: .1em; padding: 2px 5px; position: absolute; top: 4px; left: 4px; }

  .item-karte .item-name {
    background: var(--cream); border-top: 1.5px solid var(--brown);
    padding: 4px 6px;
    font-size: .6rem; color: var(--brown-lt); letter-spacing: .05em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── LIGHTBOX ────────────────────────────── */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(20,10,2,.95); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.aktiv { display: flex; }
  .lightbox-inhalt { position: relative; width: 90vw; max-width: 900px; }
  .lightbox-inhalt iframe { width: 100%; aspect-ratio: 4/3; border: 3px solid var(--brown); box-shadow: 6px 6px 0 var(--terra-dk); }
  .lightbox-close { position: absolute; top: -40px; right: 0; background: var(--terra); color: var(--cream); border: 2px solid var(--cream); font-family: 'Special Elite', cursive; font-size: .75rem; letter-spacing: .15em; padding: 6px 14px; cursor: pointer; text-transform: uppercase; }

  /* ── TICKER ──────────────────────────────── */
  .ticker-band {
    position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
    background: var(--terra); border-top: 2px solid var(--brown);
    overflow: hidden; display: flex; align-items: center;
  }
  .ticker-track {
    display: flex; white-space: nowrap;
    animation: ticker-lauf 22s linear infinite;
  }
  .ticker-track a {
    color: var(--cream); text-decoration: none;
    font-family: 'Special Elite', cursive; font-size: .72rem; letter-spacing: .18em;
    text-transform: uppercase; padding: 0 40px;
  }
  .ticker-sep { color: var(--accent); padding: 0 10px; }
  @keyframes ticker-lauf { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  @media (max-width: 700px) {
    .doppelseite { grid-template-columns: 1fr; }
    .seite:last-child { border-top: 3px solid var(--brown); }
    .buch-ruecken { display: none; }
    .item-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- ══════════ STARTSEITE ══════════ -->
<div id="startseite">
  <div class="titel-band">Bildwerk Verlag · Ausgabe 2025</div>
  <div class="titel-hauptwort">BILD<br>WERK</div>
  <div class="titel-untertitel">Fotografie &amp; Bewegtbild · Katalog Nr. 1</div>
  <div class="start-box">
    <label class="option-row">
      <input type="radio" name="modus" value="lesen" checked>
      <div class="option-info">
        <div class="option-titel">Nur lesen &amp; ansehen</div>
        <div class="option-meta">Freier Zugang · Clips starten auf Antippen · Vorschau-Qualität</div>
      </div>
      <div class="option-preis">€ 0,–</div>
    </label>
    <label class="option-row">
      <input type="radio" name="modus" value="hd">
      <div class="option-info">
        <div class="option-titel">HD Download</div>
        <div class="option-meta">Bis 4K · Alle Formate · Einzellizenzen</div>
      </div>
      <div class="option-preis">€ 12,–</div>
    </label>
    <label class="option-row">
      <input type="radio" name="modus" value="paket">
      <div class="option-info">
        <div class="option-titel">Gesamtpaket Katalog Nr. 1</div>
        <div class="option-meta">Alle Bilder &amp; Clips · Unbegrenzte Nutzung · Print-Rechte</div>
      </div>
      <div class="option-preis">€ 49,–</div>
    </label>
    <button class="start-btn" onclick="starteKatalog()">▶ &nbsp; Katalog aufschlagen</button>
    <div class="impressum">Eigenes Material · Alle Rechte vorbehalten · BILDWERK 2025</div>
  </div>
</div>


<!-- ══════════ KATALOG ══════════ -->
<div id="katalog">
  <header class="katalog-header">
    <div class="logo">BILDWERK</div>
    <nav>
      <div class="seiten-nav">
        <button class="nav-btn" id="btn-zurueck" onclick="blättern(-1)" disabled>◀ zurück</button>
        <button class="nav-btn" id="btn-vor"     onclick="blättern(1)">vor ▶</button>
      </div>
    </nav>
  </header>

  <div id="lader">+++ Lade Galerie +++ bitte warten +++</div>
  <div id="seiten-container"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-inhalt">
    <button class="lightbox-close" onclick="schliesseLightbox()">✕ Schließen</button>
    <iframe id="lb-frame" src="" allowfullscreen allow="autoplay; fullscreen"></iframe>
  </div>
</div>


<script>
const ITEM_ID   = 'nachhilfe-1';
const GALERIE   = 'https://www.deviantart.com/rembrandtiusai/tier/rembrandtius-CLIPS-AI-MUSCLE-MOVEMENT-1238677185';
const PRO_SEITE = 6;   // max Items pro Seite (= halbe Doppelseite)

const BILD_FORMATE  = ['jpeg','jpg','png','gif','tiff','tif','webp'];
const VIDEO_FORMATE = ['mp4','mpeg4','mov','avi','mkv','webm','ogv','h.264'];

let alleItems   = [];   // {name, typ:'bild'|'video', url, thumb}
let aktSeite    = 0;    // Doppelseiten-Index
let doppelSeiten = [];  // Array von Doppelseiten [{links:[...], rechts:[...]}]

/* ── START ───────────────────────────────── */
function starteKatalog() {
  const checked = document.querySelector('input[name="modus"]:checked');
  if (checked && checked.value !== 'lesen') document.body.classList.add('bestell-modus');
  document.getElementById('startseite').style.display = 'none';
  document.getElementById('katalog').style.display    = 'block';
  ladeMetadaten();
}

/* ── METADATEN VON ARCHIVE.ORG LADEN ────── */
async function ladeMetadaten() {
  try {
    const res  = await fetch(`https://archive.org/metadata/${ITEM_ID}`);
    const data = await res.json();
    const files = data.files || [];

    alleItems = [];
    files.forEach(f => {
      const name = f.name || '';
      const ext  = name.split('.').pop().toLowerCase();
      const src  = f.source || '';

      // Nur Original-Dateien (keine Derivate wie _thumbs, .sqlite, _meta, _files)
      if (src !== 'original') return;
      if (name.endsWith('_meta.xml') || name.endsWith('_files.xml') || name.includes('__ia_thumb')) return;

      const baseUrl = `https://archive.org/download/${ITEM_ID}/${encodeURIComponent(name)}`;

      if (BILD_FORMATE.includes(ext)) {
        alleItems.push({
          name,
          typ: 'bild',
          url: baseUrl,
          thumb: baseUrl
        });
      } else if (VIDEO_FORMATE.includes(ext)) {
        alleItems.push({
          name,
          typ: 'video',
          url: `https://archive.org/embed/${ITEM_ID}?start=0`,
          // Für einzelne Videos in einem Multi-File-Item:
          embedUrl: `https://archive.org/embed/${ITEM_ID}/${encodeURIComponent(name)}`,
          thumb: `https://archive.org/services/img/${ITEM_ID}`
        });
      }
    });

    if (alleItems.length === 0) {
      // Fallback: Item hat vielleicht nur ein Video
      alleItems.push({
        name: ITEM_ID,
        typ: 'video',
        url: `https://archive.org/embed/${ITEM_ID}`,
        embedUrl: `https://archive.org/embed/${ITEM_ID}`,
        thumb: `https://archive.org/services/img/${ITEM_ID}`
      });
    }

    bauteDoppelseiten();
    zeigeSeite(0);
    document.getElementById('lader').style.display = 'none';
  } catch(e) {
    document.getElementById('lader').textContent = '⚠ Fehler beim Laden. Bitte Seite neu laden.';
    console.error(e);
  }
}

/* ── DOPPELSEITEN AUFTEILEN ─────────────── */
function bauteDoppelseiten() {
  doppelSeiten = [];
  // Je 12 Items pro Doppelseite (6 links, 6 rechts)
  for (let i = 0; i < alleItems.length; i += PRO_SEITE * 2) {
    const chunk = alleItems.slice(i, i + PRO_SEITE * 2);
    doppelSeiten.push({
      links:  chunk.slice(0, PRO_SEITE),
      rechts: chunk.slice(PRO_SEITE, PRO_SEITE * 2)
    });
  }
}

/* ── SEITE ANZEIGEN ─────────────────────── */
function zeigeSeite(nr) {
  aktSeite = nr;
  const container = document.getElementById('seiten-container');
  container.innerHTML = '';

  const ds = doppelSeiten[nr];
  if (!ds) return;

  const seitenNrLinks  = nr * 2 + 2;
  const seitenNrRechts = nr * 2 + 3;
  const kapitelNr = ['I','II','III','IV','V','VI','VII','VIII','IX','X'][nr] || (nr+1);

  const div = document.createElement('div');
  div.className = 'doppelseite';
  div.innerHTML = `
    <div class="buch-ruecken"></div>

    <div class="seite" id="seite-links">
      <div class="kapitel-kopf">
        <div class="kapitel-nr">${kapitelNr}</div>
        <div class="kapitel-titel">Bildwerk · Galerie</div>
      </div>
      <div class="item-grid" id="grid-links"></div>
      <div class="seiten-nr">Seite ${seitenNrLinks}</div>
      ${tickerHTML()}
    </div>

    <div class="seite" id="seite-rechts">
      <div class="kapitel-kopf" style="flex-direction:row-reverse; justify-content:flex-start;">
        <div class="kapitel-nr" style="color:var(--terra-dk)">${kapitelNr}</div>
        <div class="kapitel-titel">Fortsetzung</div>
      </div>
      <div class="item-grid" id="grid-rechts"></div>
      <div class="seiten-nr" style="right:20px">Seite ${seitenNrRechts}</div>
      ${tickerHTML()}
    </div>
  `;
  container.appendChild(div);

  fuelleGrid('grid-links',  ds.links);
  fuelleGrid('grid-rechts', ds.rechts);

  // Nav-Buttons
  document.getElementById('btn-zurueck').disabled = (nr === 0);
  document.getElementById('btn-vor').disabled     = (nr >= doppelSeiten.length - 1);
}

/* ── GRID BEFÜLLEN ──────────────────────── */
function fuelleGrid(gridId, items) {
  const grid = document.getElementById(gridId);
  if (!grid) return;
  items.forEach((item, idx) => {
    const karte = document.createElement('div');
    karte.className = 'item-karte' + (item.typ === 'video' ? ' video-karte' : '');

    const kurzname = item.name.replace(/\.[^.]+$/, '').replace(/_/g,' ');

    if (item.typ === 'bild') {
      karte.innerHTML = `
        <div class="bild-box">
          <img src="${item.thumb}" alt="${kurzname}" loading="lazy"
               onerror="this.style.display='none'">
        </div>
        <div class="item-name">${kurzname}</div>`;
    } else {
      karte.innerHTML = `
        <div class="video-box">
          <img src="${item.thumb}" alt="${kurzname}" loading="lazy"
               onerror="this.src='https://archive.org/images/notfound.png'">
          <div class="play-mini">
            <div class="play-mini-btn"><svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg></div>
          </div>
          <div class="video-label">▶ VIDEO</div>
        </div>
        <div class="item-name">${kurzname}</div>`;
      karte.onclick = () => oeffneLightbox(item.embedUrl || item.url);
    }
    grid.appendChild(karte);
  });
}

/* ── TICKER HTML ────────────────────────── */
function tickerHTML() {
  const text = '+++ nur hier: BIG GALLERY +++ nur hier: BIG GALLERY +++';
  // Doppelt für nahtlosen Loop
  return `
    <div class="ticker-band">
      <div class="ticker-track">
        <a href="${GALERIE}" target="_blank">${text}</a>
        <a href="${GALERIE}" target="_blank">${text}</a>
        <a href="${GALERIE}" target="_blank">${text}</a>
        <a href="${GALERIE}" target="_blank">${text}</a>
      </div>
    </div>`;
}

/* ── NAVIGATION ──────────────────────────── */
function blättern(richtung) {
  const neu = aktSeite + richtung;
  if (neu >= 0 && neu < doppelSeiten.length) {
    schliesseLightbox();
    zeigeSeite(neu);
    window.scrollTo(0, 0);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') blättern(1);
  if (e.key === 'ArrowLeft')  blättern(-1);
  if (e.key === 'Escape')     schliesseLightbox();
});

/* ── LIGHTBOX ────────────────────────────── */
function oeffneLightbox(embedUrl) {
  document.getElementById('lb-frame').src = embedUrl + '?autoplay=1&start=0';
  document.getElementById('lightbox').classList.add('aktiv');
}
function schliesseLightbox() {
  document.getElementById('lb-frame').src = '';
  document.getElementById('lightbox').classList.remove('aktiv');
}
</script>
</body>
</html>
