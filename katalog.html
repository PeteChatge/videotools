<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BILDWERK – Katalog Nr. 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --paper:    #f5eed6; --paper-alt: #f0e6c8;
    --terra:    #c4603a; --terra-dk:  #8b3a1e;
    --brown:    #4a2c14; --brown-lt:  #7a5230;
    --cream:    #faf6ea; --ink:       #1e0e04;
    --accent:   #d4a535;
    --frame:    3px solid var(--brown);
    --shadow:   4px 4px 0 var(--brown);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Selektion & Drag global sperren */
  body {
    background: #2a1a08;
    font-family: 'Courier Prime', monospace;
    color: var(--ink);
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  /* ── STARTSEITE ─────────── */
  #startseite {
    min-height: 100vh; background: var(--paper);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px; position: relative; overflow: hidden;
  }
  #startseite::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent 28px, rgba(74,44,20,.06) 29px),
      repeating-linear-gradient(90deg, transparent 28px, rgba(74,44,20,.04) 29px);
    pointer-events: none; z-index: 0;
  }

  /* Cover: CSS background-image – keine <img> src im DOM */
  #cover-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: .15; z-index: 0;
    pointer-events: none;
  }

  .start-inhalt { position: relative; z-index: 1; text-align: center; }
  .titel-band { display: inline-block; background: var(--terra); color: var(--cream); padding: 8px 32px; font-family: 'Special Elite', cursive; font-size: .7rem; letter-spacing: .25em; text-transform: uppercase; margin-bottom: 16px; border: 2px solid var(--brown); box-shadow: var(--shadow); }
  .titel-hauptwort { font-family: 'Playfair Display', serif; font-size: clamp(4rem,12vw,8rem); font-weight: 700; line-height: .88; color: var(--brown); letter-spacing: -.03em; margin-bottom: 14px; }
  .autor-name { font-family: 'Special Elite', cursive; font-size: 1rem; color: var(--terra-dk); letter-spacing: .2em; text-transform: uppercase; margin-bottom: 36px; }
  .enter-btn { display: inline-block; padding: 13px 36px; background: var(--terra); color: var(--cream); border: 2px solid var(--brown); box-shadow: var(--shadow); font-family: 'Special Elite', cursive; font-size: .9rem; letter-spacing: .15em; text-transform: uppercase; cursor: pointer; transition: transform .1s, box-shadow .1s; }
  .enter-btn:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--brown); }
  .enter-btn:active { transform: translate(4px,4px); box-shadow: none; }

  /* ── KATALOG ────────────── */
  #katalog { display: none; }
  .katalog-header { background: var(--terra); color: var(--cream); display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 3px solid var(--brown); position: sticky; top: 0; z-index: 100; }
  .katalog-header .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; }
  .seiten-nav { display: flex; gap: 10px; }
  .nav-btn { background: var(--terra-dk); color: var(--cream); border: 1.5px solid var(--cream); font-family: 'Special Elite', cursive; font-size: .7rem; letter-spacing: .1em; padding: 4px 12px; cursor: pointer; transition: background .15s; }
  .nav-btn:hover { background: var(--brown); }
  .nav-btn:disabled { opacity: .35; cursor: default; }

  #lader { text-align: center; padding: 80px 20px; color: var(--cream); font-family: 'Special Elite', cursive; font-size: 1rem; letter-spacing: .2em; }

  /* ── DOPPELSEITE ─────────── */
  .doppelseite { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 4px solid var(--brown); position: relative; }
  .seite { background: var(--paper); padding: 24px 20px 16px; position: relative; border-right: 2px solid var(--brown-lt); min-height: 100vh; }
  .seite:last-child { background: var(--paper-alt); border-right: none; }
  .buch-ruecken { position: absolute; top: 0; bottom: 0; left: 50%; width: 6px; z-index: 10; background: linear-gradient(90deg,rgba(74,44,20,.3),rgba(74,44,20,.05),rgba(74,44,20,.3)); pointer-events: none; }
  .kapitel-kopf { border-bottom: 2px solid var(--brown); margin-bottom: 16px; padding-bottom: 8px; display: flex; align-items: baseline; gap: 12px; }
  .kapitel-nr { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--terra); line-height: 1; }
  .kapitel-titel { font-family: 'Special Elite', cursive; font-size: .78rem; letter-spacing: .12em; text-transform: uppercase; color: var(--brown); }
  .seiten-nr { position: absolute; bottom: 42px; font-family: 'Special Elite', cursive; font-size: .65rem; color: var(--brown-lt); letter-spacing: .1em; }
  .seite:first-child .seiten-nr { left: 20px; }
  .seite:last-child  .seiten-nr { right: 20px; }

  /* ── ITEM-GRID ───────────── */
  .item-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }

  .item-karte {
    border: 2px solid var(--brown);
    box-shadow: 2px 2px 0 var(--brown);
    overflow: hidden; background: var(--brown);
    position: relative;
  }

  /* Bild via CSS background – kein <img> im DOM */
  .item-thumb {
    width: 100%; aspect-ratio: 1/1;
    background-color: #111;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    position: relative;
  }

  /* Transparentes Schutz-Overlay verhindert Rechtsklick-Menü auf dem Bild */
  .item-thumb::after {
    content: '';
    position: absolute; inset: 0;
    background: transparent;
    z-index: 1;
  }

  .video-badge {
    position: absolute; top: 4px; left: 4px; z-index: 2;
    background: var(--terra); color: var(--cream);
    font-family: 'Special Elite', cursive; font-size: .5rem;
    letter-spacing: .1em; padding: 2px 5px;
    pointer-events: none;
  }

  .item-name {
    background: var(--cream); border-top: 1.5px solid var(--brown);
    padding: 4px 6px; font-size: .6rem; color: var(--brown-lt);
    letter-spacing: .05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── TICKER – oben, im normalen Fluss ── */
  .ticker-band {
    width: 100%; height: 34px;
    background: var(--terra);
    border-top: 2px solid var(--brown);
    border-bottom: 2px solid var(--brown);
    overflow: hidden; display: flex; align-items: center;
    margin-bottom: 12px; flex-shrink: 0;
  }
  .ticker-track { display: flex; white-space: nowrap; animation: ticker-lauf 26s linear infinite; }
  .ticker-track a { color: var(--cream); text-decoration: none; font-family: 'Special Elite', cursive; font-size: .72rem; letter-spacing: .18em; text-transform: uppercase; padding: 0 40px; }
  @keyframes ticker-lauf { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ── MOBIL ───────────────── */
  @media (max-width: 700px) {
    .doppelseite { grid-template-columns: 1fr; }
    .seite { min-height: unset; padding: 16px 12px 20px; }
    .seite:last-child { border-top: 3px solid var(--brown); border-right: none; }
    .buch-ruecken { display: none; }
    .seiten-nr { display: none; }
    .item-grid { grid-template-columns: repeat(2,1fr); gap: 6px; }
    .nav-btn { padding: 8px 18px; font-size: .8rem; }
    .katalog-header { padding: 10px 14px; }
    .katalog-header .logo { font-size: 1.1rem; }
    .titel-hauptwort { font-size: clamp(3rem,18vw,5rem); }
    .enter-btn { padding: 14px 28px; font-size: .85rem; }
  }
  @media (max-width: 380px) {
    .item-grid { gap: 4px; }
    .item-name { font-size: .5rem; }
  }
</style>
</head>
<body>

<!-- STARTSEITE -->
<div id="startseite">
  <div id="cover-bg"></div>
  <div class="start-inhalt">
    <div class="titel-band">Bildwerk Verlag · 2025</div>
    <div class="titel-hauptwort">BILD<br>WERK</div>
    <div class="autor-name">Rembrandtius AI</div>
    <div class="enter-btn" onclick="starteKatalog()">Katalog aufschlagen</div>
  </div>
</div>

<!-- KATALOG -->
<div id="katalog">
  <header class="katalog-header">
    <div class="logo">BILDWERK</div>
    <div class="seiten-nav">
      <button class="nav-btn" id="btn-z" onclick="blättern(-1)" disabled>◀ zurück</button>
      <button class="nav-btn" id="btn-v" onclick="blättern(1)">vor ▶</button>
    </div>
  </header>
  <div id="lader">+++ Lade Galerie +++</div>
  <div id="seiten-container"></div>
</div>

<script>
/* Konfiguration – Base64 verschlüsselt */
const _cfg = {
  k: atob('bmFjaGhpbGZlLTE='),
  g: atob('aHR0cHM6Ly93d3cuZGV2aWFudGFydC5jb20vcmVtYnJhbmR0aXVzYWkvdGllci9yZW1icmFuZHRpdXMtQ0xJUFMtQUktTVVTQ0xFLU1PVkVNRU5ULTEyMzg2NzcxODU=')
};

const BILD_EXT  = new Set(['jpg','jpeg','png','gif','webp','tiff','tif']);
const VIDEO_EXT = new Set(['mp4','mov','avi','mkv','webm','ogv','mpeg4']);
const PRO_SEITE = 6;

let alleItems = [], doppelSeiten = [], aktSeite = 0;

/* Rechtsklick & Drag global sperren */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('dragstart',   e => e.preventDefault());

/* ── START ── */
function starteKatalog() {
  document.getElementById('startseite').style.display = 'none';
  document.getElementById('katalog').style.display    = 'block';
  ladeMetadaten();
}

/* ── URL-Verschleierung:
   Bilder werden als CSS background-image gesetzt.
   Die URL steht im Style-Attribut, nicht als src –
   kein "Bild speichern", kein direkter Link im DOM.      ── */
function setzeThumb(el, url) {
  // URL in Base64 kodieren sodass sie im Inspektor nicht sofort lesbar ist
  const encoded = btoa(unescape(encodeURIComponent(url)));
  // Dekodierung nur zur Laufzeit direkt in style
  el.style.backgroundImage = `url('${atob(encoded)}')`;
}

/* ── METADATEN ── */
async function ladeMetadaten() {
  try {
    const res = await fetch(
      `https://archive.org/metadata/${_cfg.k}`,
      { mode: 'cors' }
    );
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const files = (data.files || []).filter(f =>
      f.source === 'original' &&
      !f.name.includes('_meta.xml') &&
      !f.name.includes('_files.xml') &&
      !f.name.includes('__ia_thumb')
    );

    alleItems = [];
    files.forEach(f => {
      const ext = f.name.split('.').pop().toLowerCase();
      const dl  = `https://archive.org/download/${_cfg.k}/${encodeURIComponent(f.name)}`;
      if (BILD_EXT.has(ext)) {
        alleItems.push({ name: f.name, typ: 'bild', url: dl });
      } else if (VIDEO_EXT.has(ext)) {
        alleItems.push({ name: f.name, typ: 'video',
          thumb: `https://archive.org/services/img/${_cfg.k}` });
      }
    });

    /* Fallback: Item hat nur ein einziges Video */
    if (!alleItems.length) {
      alleItems.push({ name: _cfg.k, typ: 'video',
        thumb: `https://archive.org/services/img/${_cfg.k}` });
    }

    /* Zufälliges Startseiten-Cover setzen */
    const bilder = alleItems.filter(i => i.typ === 'bild');
    if (bilder.length) {
      const zuf = bilder[Math.floor(Math.random() * bilder.length)];
      document.getElementById('cover-bg').style.backgroundImage = `url('${zuf.url}')`;
    }

    bauteDoppelseiten();
    zeigeSeite(0);
    document.getElementById('lader').style.display = 'none';

  } catch(err) {
    document.getElementById('lader').innerHTML =
      `⚠ Verbindungsfehler (${err.message}). `+
      `<br><small style="opacity:.6">Bitte Seite neu laden oder später versuchen.</small>`;
  }
}

/* ── COVER vorab laden (vor Katalog-Öffnung) ── */
async function ladeVorschau() {
  try {
    const res  = await fetch(`https://archive.org/metadata/${_cfg.k}`, { mode: 'cors' });
    const data = await res.json();
    const bilder = (data.files || []).filter(f => {
      const ext = (f.name||'').split('.').pop().toLowerCase();
      return BILD_EXT.has(ext) && f.source === 'original';
    });
    if (!bilder.length) return;
    const zuf = bilder[Math.floor(Math.random() * bilder.length)];
    document.getElementById('cover-bg').style.backgroundImage =
      `url('https://archive.org/download/${_cfg.k}/${encodeURIComponent(zuf.name)}')`;
  } catch {}
}

/* ── DOPPELSEITEN ── */
function bauteDoppelseiten() {
  doppelSeiten = [];
  for (let i = 0; i < alleItems.length; i += PRO_SEITE * 2) {
    doppelSeiten.push({
      links:  alleItems.slice(i,            i + PRO_SEITE),
      rechts: alleItems.slice(i + PRO_SEITE, i + PRO_SEITE * 2)
    });
  }
}

/* ── SEITE ── */
function zeigeSeite(nr) {
  aktSeite = nr;
  const c  = document.getElementById('seiten-container');
  c.innerHTML = '';
  const ds = doppelSeiten[nr]; if (!ds) return;
  const rn = ['I','II','III','IV','V','VI','VII','VIII','IX','X'][nr] || (nr+1);

  const div = document.createElement('div');
  div.className = 'doppelseite';
  div.innerHTML = `
    <div class="buch-ruecken"></div>
    <div class="seite">
      <div class="kapitel-kopf">
        <div class="kapitel-nr">${rn}</div>
        <div class="kapitel-titel">Bildwerk · Galerie</div>
      </div>
      ${ticker()}
      <div class="item-grid" id="gl"></div>
      <div class="seiten-nr">Seite ${nr*2+2}</div>
    </div>
    <div class="seite">
      <div class="kapitel-kopf" style="flex-direction:row-reverse;justify-content:flex-start;">
        <div class="kapitel-nr" style="color:var(--terra-dk)">${rn}</div>
        <div class="kapitel-titel">Fortsetzung</div>
      </div>
      ${ticker()}
      <div class="item-grid" id="gr"></div>
      <div class="seiten-nr" style="right:20px">Seite ${nr*2+3}</div>
    </div>`;
  c.appendChild(div);
  fuelleGrid('gl', ds.links);
  fuelleGrid('gr', ds.rechts);
  document.getElementById('btn-z').disabled = (nr === 0);
  document.getElementById('btn-v').disabled = (nr >= doppelSeiten.length - 1);
}

/* ── GRID ── */
function fuelleGrid(id, items) {
  const grid = document.getElementById(id); if (!grid) return;
  items.forEach(item => {
    const karte = document.createElement('div');
    karte.className = 'item-karte';

    const thumb = document.createElement('div');
    thumb.className = 'item-thumb';
    setzeThumb(thumb, item.typ === 'bild' ? item.url : item.thumb);

    if (item.typ === 'video') {
      const badge = document.createElement('div');
      badge.className = 'video-badge';
      badge.textContent = '▶ VIDEO';
      karte.appendChild(badge);
    }

    const nameDiv = document.createElement('div');
    nameDiv.className = 'item-name';
    nameDiv.textContent = item.name.replace(/\.[^.]+$/, '').replace(/_/g,' ');

    karte.appendChild(thumb);
    karte.appendChild(nameDiv);
    grid.appendChild(karte);
  });
}

/* ── TICKER ── */
function ticker() {
  const t = '+++ nur hier: BIG GALLERY +++ nur hier: BIG GALLERY +++';
  return `<div class="ticker-band"><div class="ticker-track">
    <a href="${_cfg.g}" target="_blank" rel="noopener">${t}</a>
    <a href="${_cfg.g}" target="_blank" rel="noopener">${t}</a>
    <a href="${_cfg.g}" target="_blank" rel="noopener">${t}</a>
    <a href="${_cfg.g}" target="_blank" rel="noopener">${t}</a>
  </div></div>`;
}

/* ── NAVIGATION ── */
function blättern(d) {
  const n = aktSeite + d;
  if (n >= 0 && n < doppelSeiten.length) { zeigeSeite(n); window.scrollTo(0,0); }
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') blättern(1);
  if (e.key === 'ArrowLeft')  blättern(-1);
});

/* Sofort Vorschau-Bild für Startseite laden */
ladeVorschau();

/* ── Touch-Swipe für Handy ── */
let _tx = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 50) blättern(dx < 0 ? 1 : -1);
}, {passive:true});
</script>
</body>
</html>
